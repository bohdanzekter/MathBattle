<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Math Battle</title>
    <!-- Підключаємо зовнішній файл стилів -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>⚡ MATH BATTLE ⚡</h1>

    <!-- Екран 1: Налаштування -->
    <div id="startScreen">
        <input type="text" id="nickname" placeholder="Твій нікнейм..." maxlength="15" autocomplete="off"><br>
        <select id="difficultySelect">
            <!-- Заповниться через Fetch API -->
        </select><br>
        <button onclick="startGame()">START 60s SPRINT</button>
    </div>

    <!-- Екран 2: Гра -->
    <div id="gameScreen" class="hidden">
        <h2 style="color: #ff3366;">Час: <span id="time">60</span>с</h2>
        <h3 style="color: #ffff00;">Рахунок: <span id="score">0</span></h3>
        <div id="question">2 + 2 = ?</div>
        <input type="number" id="answer" autocomplete="off" oninput="checkAnswer()">
    </div>

    <!-- Екран 3: Результати -->
    <div id="endScreen" class="hidden">
        <h2>ГРА ЗАКІНЧЕНА!</h2>
        <h3>Твій рахунок: <span id="finalScore">0</span></h3>
        <button onclick="location.reload()">ГРАТИ ЩЕ РАЗ</button>

        <div class="leaderboard">
            <h3 style="text-align: center;">🏆 ТОП-10 🏆</h3>
            <ol id="leaderboardList">Завантаження...</ol>
        </div>
    </div>

    <!-- Підключаємо зовнішній файл логіки -->
    <script src="js/game.js"></script>
</body>
</html>
